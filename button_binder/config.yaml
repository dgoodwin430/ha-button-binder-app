name: Button Binder
version: "0.1.0"
slug: button_binder
description: GUI for learning Home Assistant button events and assigning actions
url: https://github.com/dgoodwin430/ha-button-binder-app
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:gesture-tap-button
homeassistant_api: true
options:
  event_types:
    - zha_event
    - state_changed
schema:
  event_types:
    - str
